let ans={},cf='all';
function render(){
const box=document.getElementById('qBox');box.innerHTML='';
Q.forEach(q=>{
const d=document.createElement('div');d.className='qc';d.dataset.s=q.s;d.dataset.id=q.id;
if(cf!=='all'&&String(q.s)!==cf)d.classList.add('hid');
if(ans[q.id])d.classList.add(ans[q.id].ok?'ok':'no');
d.innerHTML=`<div class="qh"><span class="qn">Q${q.id}</span><span class="yr">${q.y}</span><span class="qb" data-s="${q.s}">${SN[q.s]}</span></div>
<div class="qt">${q.t}</div><div class="opts">${q.o.map((o,i)=>{
let c='opt';if(ans[q.id]){c+=' dis';if(i===q.a)c+=' ca';if(ans[q.id].sel===i&&i!==q.a)c+=' wa';}
return `<div class="${c}" onclick="pick(${q.id},${i})"><span class="on">${i+1}</span><span>${o}</span></div>`;}).join('')}</div>
<div class="exp${ans[q.id]?' show':''}" id="e${q.id}"><strong>해설:</strong> ${q.e}</div>`;
box.appendChild(d);});}
function pick(id,sel){if(ans[id])return;const q=Q.find(x=>x.id===id);ans[id]={sel,ok:sel===q.a};upd();render();}
function upd(){const t=Object.keys(ans).length,c=Object.values(ans).filter(a=>a.ok).length;
document.getElementById('sT').textContent=t;document.getElementById('sC').textContent=c;
document.getElementById('sW').textContent=t-c;document.getElementById('sR').textContent=t?Math.round(c/t*100):0;}
function fil(s){cf=s;document.querySelectorAll('.sbt').forEach(b=>b.classList.toggle('ac',b.dataset.s===s));render();}
function showAll(){Q.forEach(q=>{if(!ans[q.id])ans[q.id]={sel:q.a,ok:true};});upd();render();}
function resetAll(){if(!confirm('모든 답안을 초기화하시겠습니까?'))return;ans={};upd();render();window.scrollTo({top:0,behavior:'smooth'});}
function showWrong(){const w=Object.entries(ans).filter(([,a])=>!a.ok);if(!w.length){alert('오답이 없습니다!');return;}
cf='all';document.querySelectorAll('.sbt').forEach(b=>b.classList.toggle('ac',b.dataset.s==='all'));render();
document.querySelectorAll('.qc').forEach(c=>{const id=parseInt(c.dataset.id);if(ans[id]&&ans[id].ok)c.classList.add('hid');else if(ans[id]&&!ans[id].ok)c.classList.remove('hid');});
const f=document.querySelector('.qc.no:not(.hid)');if(f)f.scrollIntoView({behavior:'smooth',block:'start'});}
window.addEventListener('scroll',()=>{document.getElementById('btt').classList.toggle('show',window.scrollY>500);});
render();
</script>
